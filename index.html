<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SBI 사이다 낚시왕</title>
<style>
:root{--blue:#0759b7;--nav:#062b55;--gold:#ffb62e;--green:#2fd25a;--card:rgba(5,40,84,.72);--line:rgba(255,255,255,.22);--vh:100dvh}*{box-sizing:border-box}html,body{margin:0;height:100%;background:#071b38;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:#fff;overflow:hidden}.phone{position:relative;margin:0 auto;width:min(100vw,430px);height:100dvh;background:#0b4c9b;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.12)}.screen{position:absolute;inset:0;display:none;background-size:cover;background-position:center top}.screen.active{display:block}.art{position:absolute;inset:0;background-size:cover;background-position:center top}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,0) 52%,rgba(0,19,45,.22) 72%,rgba(0,12,30,.55) 100%)}button{font-family:inherit;border:0;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}.tap{position:absolute;border-radius:24px;background:transparent}.tap:active{background:rgba(255,255,255,.14)}.top{position:absolute;z-index:10;left:12px;right:12px;top:10px;height:54px;display:flex;align-items:center;justify-content:space-between}.profile{display:flex;align-items:center;gap:9px;border-radius:22px;background:rgba(6,57,107,.85);box-shadow:inset 0 0 0 2px rgba(255,255,255,.16),0 4px 0 rgba(0,0,0,.18);padding:7px 12px 7px 8px;min-width:128px}.avatar{width:43px;height:43px;border-radius:50%;background:#fff;display:grid;place-items:center;color:#111;font-size:25px;box-shadow:inset 0 0 0 5px #167be9}.profile strong{display:block;font-size:14px;line-height:1}.profile span{font-weight:900;font-size:13px}.xp{height:6px;background:rgba(255,255,255,.35);border-radius:20px;margin-top:5px;overflow:hidden}.xp i{display:block;width:52%;height:100%;background:#4be564}.wallet{display:flex;align-items:center;gap:7px}.pill{height:36px;display:flex;align-items:center;gap:5px;background:rgba(6,57,107,.9);border-radius:18px;padding:0 12px;font-weight:900;box-shadow:inset 0 0 0 2px rgba(255,255,255,.18),0 3px 0 rgba(0,0,0,.2)}.menu{width:42px;height:42px;border-radius:16px;background:rgba(6,57,107,.9);font-size:25px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.18),0 3px 0 rgba(0,0,0,.2)}.nav{position:absolute;z-index:30;left:0;right:0;bottom:0;padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:7px;background:rgba(2,25,54,.94);box-shadow:0 -8px 25px rgba(0,0,0,.22)}.nav button{height:58px;border-radius:18px;background:transparent;font-weight:900;color:#cfe7ff}.nav button.active{background:rgba(255,255,255,.16);color:#fff}.nav b{display:block;font-size:22px;line-height:1.1}.nav span{font-size:12px}.dialog{position:absolute;z-index:60;left:18px;right:18px;top:50%;transform:translateY(-50%);padding:20px;border-radius:26px;background:rgba(4,34,71,.92);box-shadow:0 20px 60px rgba(0,0,0,.35),inset 0 0 0 2px rgba(255,255,255,.18);display:none}.dialog.show{display:block}.dialog h2{margin:0 0 10px;font-size:25px}.dialog p{margin:6px 0;color:#d6ebff;font-weight:700}.ok{width:100%;height:52px;margin-top:14px;border-radius:18px;background:linear-gradient(#5ee743,#20b737);box-shadow:0 5px 0 #108d20;font-size:20px;font-weight:900}.back{position:absolute;z-index:20;left:15px;top:16px;width:38px;height:38px;border-radius:50%;background:rgba(5,48,98,.78);font-size:25px}.titlebar{position:absolute;z-index:15;left:64px;right:16px;top:15px;height:40px;background:rgba(5,48,98,.78);border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:19px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}.gaugeLayer{position:absolute;z-index:50;left:0;right:0;bottom:78px;padding:18px;display:none;background:linear-gradient(0deg,rgba(0,18,48,.85),rgba(0,18,48,.15));}.gaugeLayer.show{display:block}.bubble{width:max-content;max-width:92%;margin:0 auto 18px;padding:12px 18px;border-radius:18px;background:rgba(5,41,84,.88);text-align:center;font-weight:900;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}.gauge{position:relative;height:48px;border-radius:20px;overflow:hidden;background:linear-gradient(90deg,#e84232 0 22%,#f3bd35 22% 36%,#25c44b 36% 64%,#f3bd35 64% 78%,#e84232 78%);border:5px solid rgba(3,31,66,.95);box-shadow:0 8px 20px rgba(0,0,0,.35),inset 0 0 10px rgba(255,255,255,.25)}.pointer{position:absolute;top:-14px;left:0;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:20px solid #e9fbff;filter:drop-shadow(0 2px 1px rgba(0,0,0,.4));}.clickBtn{display:block;margin:22px auto 0;width:142px;height:58px;border-radius:22px;background:linear-gradient(#ffcc38,#f19916);box-shadow:0 6px 0 #b4610c;font-size:24px;font-weight:900}.bigFishBtn{position:absolute;z-index:22;left:22px;right:190px;bottom:95px;height:70px;border-radius:25px;background:transparent}.bigMapBtn{position:absolute;z-index:22;right:22px;width:154px;bottom:95px;height:70px;border-radius:25px;background:transparent}.homeTopClick{position:absolute;inset:0}.fishAction{position:absolute;z-index:15;left:33%;right:25%;bottom:150px;height:120px;border-radius:80px;background:transparent}.resultCard{position:absolute;z-index:70;left:22px;right:22px;top:130px;display:none}.resultCard.show{display:block}.resultCard .panel{border-radius:26px;background:#f4efe4;color:#17334e;text-align:center;padding:20px;box-shadow:0 18px 40px rgba(0,0,0,.35)}.resultCard h1{font-size:44px;margin:0 0 8px}.success h1{color:#79e238}.fail h1{color:#ff675c}.fishIcon{font-size:75px}.sectionList{position:absolute;z-index:10;left:0;right:0;top:76px;bottom:76px;overflow:auto;padding:0 12px 20px}.listCard{height:122px;margin-bottom:12px;border-radius:22px;background:rgba(255,255,255,.13);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);display:flex;align-items:center;padding:10px;gap:14px}.listCard .thumb{width:116px;height:84px;border-radius:18px;background-size:cover;background-position:center;box-shadow:inset 0 0 0 2px rgba(255,255,255,.18)}.listCard h3{margin:0;font-size:20px}.tag{display:inline-block;margin-top:5px;padding:5px 13px;border-radius:99px;background:#30b957;font-weight:900}.codexGrid{position:absolute;z-index:10;left:14px;right:14px;top:88px;bottom:82px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;overflow:auto}.fishTile{border-radius:14px;background:#f5ead7;color:#143153;text-align:center;padding:8px 4px;font-weight:900;box-shadow:inset 0 0 0 1px #d6c3a4}.fishTile .f{font-size:40px;line-height:1}.fishTile small{display:block;color:#1eae55}.fishTile.lock{filter:saturate(.1);opacity:.55}.missionBox{position:absolute;z-index:10;left:16px;right:16px;top:84px;padding:18px;border-radius:24px;background:rgba(5,45,91,.86);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}.missionBox h2{margin:0 0 16px;color:#ffe05c}.mrow{margin:13px 0;font-weight:900}.bar{height:12px;border-radius:20px;background:rgba(255,255,255,.23);overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;background:#53d858}.notice{position:absolute;z-index:100;left:12px;right:12px;bottom:88px;padding:12px 14px;border-radius:16px;background:rgba(0,0,0,.65);font-weight:800;text-align:center;display:none}.notice.show{display:block;animation:fade 1.8s both}@keyframes fade{0%,100%{opacity:0;transform:translateY(8px)}15%,80%{opacity:1;transform:none}}
/* screen backgrounds */#home .art{background-image:url('assets/bg/home.webp')}#map .art{background-image:url('assets/bg/map.webp')}#fishing .art{background-image:url('assets/bg/fishing.webp');background-size:cover;background-position:center top}#codex{background:#073c78}#mission{background:linear-gradient(#0d70c5,#052c5a)}#rod{background:#052f62}#rod .art{background-image:url('assets/bg/rod.webp');opacity:.72}#codex .art{background-image:url('assets/bg/codex.webp');opacity:.85;background-size:cover;background-position:center top}.hiddenA11y{position:absolute;left:-9999px}
</style>
</head>
<body>
<div class="phone" id="app">
  <section class="screen active" id="home"><div class="art"></div><div class="shade"></div><button class="tap bigFishBtn" data-go="fishing" aria-label="낚시하기"></button><button class="tap bigMapBtn" data-go="map" aria-label="세계 지도"></button></section>
  <section class="screen" id="map"><div class="art"></div><button class="back" data-go="home">‹</button><div class="titlebar">세계 지도</div><div class="sectionList" style="top:118px">
    <button class="listCard" data-go="fishing"><div class="thumb" style="background-image:url('assets/bg/fishing.webp')"></div><div><h3>1. 얼음적금 섬</h3><span class="tag">쉬움</span></div></button>
    <button class="listCard" data-go="fishing"><div class="thumb" style="background-image:url('assets/bg/map.webp')"></div><div><h3>2. 저축빙벽</h3><span class="tag">보통</span></div></button>
    <button class="listCard" data-go="fishing"><div class="thumb" style="background-image:url('assets/bg/map.webp')"></div><div><h3>3. 주식상어 바다</h3><span class="tag" style="background:#f58b28">어려움</span></div></button>
    <button class="listCard"><div class="thumb" style="background-image:url('assets/bg/map.webp');filter:brightness(.55)"></div><div><h3>4. 금리 화산 🔒</h3><span class="tag" style="background:#a14cef">매우 어려움</span></div></button>
    <button class="listCard"><div class="thumb" style="background-image:url('assets/bg/map.webp');filter:brightness(.45)"></div><div><h3>5. 전설의 부자 바다 🔒</h3><span class="tag" style="background:#2f7cff">전설</span></div></button>
  </div></section>
  <section class="screen" id="fishing"><div class="art"></div><button class="back" data-go="home">‹</button><div class="titlebar">낚시하기</div><button class="fishAction" id="biteBtn" aria-label="입질"></button><div class="gaugeLayer" id="gaugeLayer"><div class="bubble">물고기가 입질하고 있어요!<br>초록 영역에 맞춰 클릭하세요!</div><div class="gauge" id="gauge"><div class="pointer" id="pointer"></div></div><button class="clickBtn" id="hitBtn">클릭!</button></div><div class="resultCard success" id="success"><div class="panel"><h1>성공!</h1><div>멋지게 잡았어요!</div><div class="fishIcon">🐟</div><h2>사이다 붕어</h2><p>21.4cm · EXP +18 · 🪙 +34</p><button class="ok" data-go="home">확인</button></div></div><div class="resultCard fail" id="fail"><div class="panel"><h1>실패!</h1><div>아쉽게 놓쳤어요!</div><div class="fishIcon">🌊</div><button class="ok" id="retry">다시 시도</button></div></div></section>
  <section class="screen" id="codex"><div class="art"></div><button class="back" data-go="home">‹</button><div class="titlebar">물고기 도감 <small style="margin-left:8px;font-size:12px">수집률 45%</small></div><div class="codexGrid" id="codexGrid"></div></section>
  <section class="screen" id="mission"><div class="art"></div><button class="back" data-go="home">‹</button><div class="titlebar">미션</div><div class="missionBox"><h2>오늘의 미션</h2><div class="mrow">✅ 물고기 5마리 잡기 <b style="float:right">3/5</b><div class="bar"><i style="width:60%"></i></div></div><div class="mrow">✅ 희귀 물고기 1마리 잡기 <b style="float:right">0/1</b><div class="bar"><i style="width:10%"></i></div></div><div class="mrow">✅ 100 포인트 획득 <b style="float:right">60/100</b><div class="bar"><i style="width:60%"></i></div></div><button class="ok">보상 받기 🎁</button></div></section>
  <section class="screen" id="rod"><div class="art"></div><button class="back" data-go="home">‹</button><div class="titlebar">낚싯대</div></section>
  <nav class="nav"><button class="active" data-go="home"><b>🏠</b><span>홈</span></button><button data-go="mission"><b>🧾</b><span>미션</span></button><button data-go="codex"><b>📖</b><span>도감</span></button><button data-go="rod"><b>🎣</b><span>낚싯대</span></button><button><b>⚙️</b><span>설정</span></button></nav>
  <div class="notice" id="notice"></div>
</div>
<script>
const screens=[...document.querySelectorAll('.screen')];const nav=[...document.querySelectorAll('.nav button')];function show(id){screens.forEach(s=>s.classList.toggle('active',s.id===id));nav.forEach(b=>b.classList.toggle('active',b.dataset.go===id));document.querySelectorAll('.gaugeLayer,.resultCard').forEach(e=>e.classList.remove('show'));}document.addEventListener('click',e=>{const t=e.target.closest('[data-go]');if(t)show(t.dataset.go);});const fish=['사이다 붕어','톡톡 잉어','버블 송어','청량 참치','스파클 가자미','무지개 연어','황금 가오리','전설의 고래','거품 문어','탄산 복어','시원한 새우','빙하 상어','???','???','???'];const icons=['🐟','🐠','🐟','🐟','🐟','🐟','🐡','🐋','🐙','🐡','🦐','🦈','❔','❔','❔'];const grid=document.getElementById('codexGrid');fish.forEach((f,i)=>{const d=document.createElement('div');d.className='fishTile '+(f==='???'?'lock':'');d.innerHTML=`<div class="f">${icons[i]}</div><div>${f}</div><small>${i>11?'전설':i>5?'희귀':'일반'}</small>`;grid.appendChild(d)});let pos=0,dir=1,raf,running=false;const layer=document.getElementById('gaugeLayer'),pointer=document.getElementById('pointer'),hit=document.getElementById('hitBtn');function loop(){pos+=dir*1.7;if(pos>=96){pos=96;dir=-1}if(pos<=0){pos=0;dir=1}pointer.style.left=`calc(${pos}% - 12px)`;raf=requestAnimationFrame(loop)}document.getElementById('biteBtn').onclick=()=>{layer.classList.add('show');document.getElementById('success').classList.remove('show');document.getElementById('fail').classList.remove('show');pos=Math.random()*80+10;dir=Math.random()>.5?1:-1;if(!running){running=true;loop()}};hit.onclick=()=>{cancelAnimationFrame(raf);running=false;layer.classList.remove('show');const ok=pos>=36&&pos<=64;document.getElementById(ok?'success':'fail').classList.add('show')};document.getElementById('retry').onclick=()=>{document.getElementById('fail').classList.remove('show');document.getElementById('biteBtn').click()};
</script>
</body>
</html>
