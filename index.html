<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SBI 사이다 낚시왕</title>
<style>
:root{--navy:#053a73;--navy2:#062b55;--blue:#1686e8;--sky:#52c8ff;--gold:#ffbd31;--green:#40d64a;--paper:#fff4da;--ink:#07335f;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;background:#eaf8ff;color:#fff;overflow-x:hidden}.phone{position:relative;min-height:100svh;max-width:480px;margin:0 auto;background:linear-gradient(#5fd0ff 0%,#0d70bd 58%,#043665 100%);box-shadow:0 0 40px rgba(0,0,0,.25);overflow:hidden;padding-bottom:98px}.scene{position:absolute;inset:0;background:radial-gradient(circle at 72px 180px,rgba(255,255,255,.42) 0 70px,transparent 72px),radial-gradient(circle at 83% 98px,rgba(255,255,255,.9) 0 58px,transparent 60px),radial-gradient(circle at 94% 132px,rgba(255,255,255,.65) 0 36px,transparent 38px),linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,38,92,.55));pointer-events:none}.scene:after{content:"";position:absolute;left:-70px;right:-70px;bottom:0;height:42%;background:repeating-linear-gradient(165deg,rgba(255,255,255,.06) 0 2px,transparent 2px 40px),linear-gradient(180deg,#0a6fb6,#033962);clip-path:polygon(0 8%,100% 0,100% 100%,0 100%)}.ice{position:absolute;opacity:.18;background:#fff;filter:drop-shadow(20px 32px 0 rgba(255,255,255,.24));clip-path:polygon(50% 0,100% 100%,0 100%)}.ice.i1{width:140px;height:130px;left:52px;top:330px}.ice.i2{width:180px;height:160px;right:-30px;top:190px}.topbar{position:relative;z-index:2;display:flex;align-items:center;gap:10px;padding:12px 12px 4px}.profile{display:flex;align-items:center;gap:9px;background:linear-gradient(#1b629c,#0d4375);border:2px solid rgba(255,255,255,.22);border-radius:26px;padding:8px 14px 8px 8px;box-shadow:0 8px 0 rgba(0,52,99,.18);min-width:154px}.avatar{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 52% 65%,#fff8df 0 22%,#071a2d 23% 60%,#1173da 61%);border:5px solid #2b9af7;position:relative}.avatar:before{content:"";position:absolute;width:8px;height:14px;border-radius:50%;background:#071a2d;left:18px;top:18px;box-shadow:14px 0 #071a2d}.avatar:after{content:"";position:absolute;border-left:10px solid #ffac22;border-top:5px solid transparent;border-bottom:5px solid transparent;left:24px;top:27px}.name{font-weight:900;font-size:20px;line-height:1.05}.level{font-weight:900;font-size:16px}.exp{margin-top:5px;width:72px;height:8px;background:rgba(255,255,255,.35);border-radius:20px;overflow:hidden}.exp i{display:block;width:42%;height:100%;background:#5df260}.wallet{margin-left:auto;display:flex;gap:8px}.pill{height:42px;min-width:88px;display:flex;align-items:center;justify-content:center;gap:7px;background:linear-gradient(#174f85,#082f5b);border:2px solid rgba(255,255,255,.22);border-radius:23px;font-weight:900;font-size:23px;box-shadow:0 6px 0 rgba(0,38,86,.18)}.menu{width:54px;min-width:54px;font-size:28px}.logo{position:relative;z-index:1;text-align:center;margin-top:44px;text-shadow:0 5px 0 rgba(0,50,105,.24)}.logo small{display:block;font-size:26px;font-weight:1000;letter-spacing:.3px}.logo h1{margin:0;font-size:46px;line-height:.96;font-weight:1000}.logo .crown{font-size:34px;filter:drop-shadow(0 4px 0 rgba(0,0,0,.14))}.tag{margin-top:14px;color:#07335f;font-size:21px;font-weight:1000;text-shadow:0 2px rgba(255,255,255,.5)}.hero{position:relative;z-index:1;height:360px;margin-top:10px}.penguin{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;width:240px;height:290px}.body{position:absolute;left:50%;bottom:23px;transform:translateX(-50%);width:150px;height:210px;background:#07192b;border-radius:48% 48% 42% 42%;box-shadow:inset -16px -20px #020d1a}.belly{position:absolute;left:29px;top:55px;width:92px;height:128px;background:#fff7df;border-radius:50%}.eye{position:absolute;top:63px;width:12px;height:28px;background:#061729;border-radius:50%}.eye.l{left:55px}.eye.r{right:55px}.beak{position:absolute;left:103px;top:96px;border-left:34px solid #ffae19;border-top:8px solid transparent;border-bottom:8px solid transparent}.cheek{position:absolute;top:105px;width:25px;height:15px;background:#ff9faa;border-radius:50%;opacity:.9}.cheek.l{left:34px}.cheek.r{right:34px}.hat{position:absolute;left:50%;top:24px;transform:translateX(-50%);width:118px;height:55px;background:linear-gradient(#0e7ceb,#025ac8);border-radius:42px 42px 22px 22px;box-shadow:inset 0 -9px rgba(0,0,0,.08)}.hat:before{content:"SBI";position:absolute;color:white;left:35px;top:18px;font-size:25px;font-weight:1000;font-style:italic}.scarf{position:absolute;left:42px;top:142px;width:158px;height:42px;background:linear-gradient(#0e87ff,#006fdc);border-radius:22px;box-shadow:inset 0 -8px rgba(0,0,0,.1)}.wing{position:absolute;top:140px;width:44px;height:82px;background:#041326;border-radius:50%}.wing.l{left:17px;transform:rotate(18deg)}.wing.r{right:17px;transform:rotate(-18deg)}.foot{position:absolute;bottom:0;width:58px;height:24px;background:#ffb01f;border-radius:50%}.foot.l{left:64px}.foot.r{right:66px}.rod{position:absolute;right:3px;top:0;width:90px;height:195px;border-right:8px solid #6a3406;border-radius:0 100% 0 0;transform:rotate(-20deg)}.line{position:absolute;right:9px;top:89px;width:1px;height:130px;background:rgba(255,255,255,.75)}.float{position:absolute;right:-5px;bottom:34px;width:20px;height:36px;background:linear-gradient(#ff5a33 0 48%,#fff 49% 72%,#1b84f0 73%);border-radius:12px}.bucket{position:absolute;right:14px;bottom:36px;width:72px;height:78px;background:linear-gradient(#158df5,#0472ca);border:6px solid #7fd5ff;border-radius:18px}.bucket:before{content:"SBI";position:absolute;inset:18px 0 auto;text-align:center;font-size:26px;font-weight:1000}.fish{position:absolute;right:63px;bottom:91px;font-size:34px;animation:swim 2.2s ease-in-out infinite}@keyframes swim{50%{transform:translateY(-8px) rotate(-8deg)}}.panelRow{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 14px}.card{background:linear-gradient(145deg,rgba(5,59,108,.96),rgba(2,43,79,.96));border:2px solid rgba(255,255,255,.18);border-radius:24px;padding:20px;box-shadow:0 10px 0 rgba(0,32,70,.22),inset 0 1px rgba(255,255,255,.12)}.card h2{margin:0 0 16px;color:#ffe15b;font-size:28px}.mission{font-weight:900;font-size:16px}.missionLine{margin:13px 0}.missionLine div{display:flex;justify-content:space-between;gap:8px}.bar{height:8px;background:rgba(255,255,255,.24);border-radius:9px;margin-top:8px;overflow:hidden}.bar i{display:block;height:100%;border-radius:9px;background:linear-gradient(90deg,#3cf26d,#9bfd5d)}.gift{text-align:center}.gift p{margin:2px 0 22px;font-size:18px;font-weight:800}.gift .box{font-size:54px;margin-bottom:8px}.greenBtn,.mainBtn,.mapBtn{border:0;border-radius:24px;color:#fff;font-weight:1000;box-shadow:inset 0 3px rgba(255,255,255,.28),0 8px 0 rgba(0,0,0,.2);cursor:pointer}.greenBtn{background:linear-gradient(#5feb4d,#24b72c);font-size:24px;padding:16px 22px}.cta{position:relative;z-index:2;display:grid;grid-template-columns:1.2fr .82fr;gap:14px;padding:14px}.mainBtn,.mapBtn{height:76px;font-size:30px}.mainBtn{background:linear-gradient(#ffc04d,#f39717)}.mapBtn{background:linear-gradient(#52bfff,#0c7bd7)}.bottomNav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(480px,100%);height:88px;background:rgba(0,24,50,.96);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:5;border-top:2px solid rgba(255,255,255,.2)}.navItem{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;color:#d9efff;font-weight:900;font-size:14px}.navItem.active{background:rgba(255,255,255,.14)}.navItem b{font-size:23px}.time{position:absolute;right:18px;top:132px;z-index:3;background:rgba(7,48,91,.84);border-radius:20px;padding:8px 13px;font-weight:900}.bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);animation:rise 6s linear infinite}.b1{width:12px;height:12px;left:18%;bottom:37%;animation-delay:.5s}.b2{width:8px;height:8px;left:74%;bottom:32%;animation-delay:1.4s}.b3{width:15px;height:15px;left:87%;bottom:41%;animation-delay:2.2s}@keyframes rise{to{transform:translateY(-160px);opacity:0}}@media(max-width:390px){.logo h1{font-size:40px}.hero{height:330px}.penguin{transform:translateX(-50%) scale(.9)}.card{padding:16px}.card h2{font-size:24px}.mainBtn,.mapBtn{font-size:25px}.pill{min-width:70px;font-size:19px}.profile{min-width:134px}.name{font-size:18px}}
</style>
</head>
<body>
<main class="phone">
  <div class="scene"></div><div class="ice i1"></div><div class="ice i2"></div><div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div>
  <header class="topbar"><div class="profile"><div class="avatar"></div><div><div class="name">팽팽이</div><div class="level">LV.12</div><div class="exp"><i></i></div></div></div><div class="wallet"><div class="pill">🪙 12345</div><div class="pill">💎 320</div><div class="pill menu">☰</div></div></header>
  <div class="time">☀️ AM 08:30</div>
  <section class="logo"><small>SBI</small><h1>사이다 낚시왕 <span class="crown">👑</span></h1><div class="tag">얼음적금 섬의 펭귄, 목표는 부자되기!</div></section>
  <section class="hero" aria-label="캐릭터 영역"><div class="penguin"><div class="rod"></div><div class="line"><div class="float"></div></div><div class="body"><div class="belly"></div><div class="eye l"></div><div class="eye r"></div><div class="beak"></div><div class="cheek l"></div><div class="cheek r"></div></div><div class="hat"></div><div class="wing l"></div><div class="wing r"></div><div class="scarf"></div><div class="foot l"></div><div class="foot r"></div><div class="bucket"></div><div class="fish">🐟</div></div></section>
  <section class="panelRow"><article class="card"><h2>오늘의 미션</h2><div class="mission"><div class="missionLine"><div><span>물고기 5마리 잡기</span><b>0/5</b></div><div class="bar"><i style="width:0%"></i></div></div><div class="missionLine"><div><span>희귀 물고기 1마리 잡기</span><b>0/1</b></div><div class="bar"><i style="width:0%"></i></div></div><div class="missionLine"><div><span>100 포인트 획득</span><b>0/100</b></div><div class="bar"><i style="width:0%"></i></div></div></div></article><article class="card gift"><h2>출석 보상</h2><p>7일 출석하고 보상받자!</p><div class="box">🎁</div><button class="greenBtn">오늘 출석</button></article></section>
  <section class="cta"><button class="mainBtn">🎣 낚시하기 x1</button><button class="mapBtn">🌎 세계 지도</button></section>
  <nav class="bottomNav"><div class="navItem active"><b>🏠</b>홈</div><div class="navItem"><b>🧾</b>미션</div><div class="navItem"><b>📖</b>도감</div><div class="navItem"><b>🎣</b>낚싯대</div><div class="navItem"><b>⚙️</b>설정</div></nav>
</main>
<script>
const pad=n=>String(n).padStart(2,'0');
function setTime(){const d=new Date();const h=d.getHours();const am=h<12?'AM':'PM';const hour=h%12||12;document.querySelector('.time').textContent=`${h>=6&&h<18?'☀️':'🌙'} ${am} ${pad(hour)}:${pad(d.getMinutes())}`;}
setTime();setInterval(setTime,60000);
document.querySelector('.mainBtn').addEventListener('click',()=>alert('다음 단계에서 낚시 입질 게이지 화면을 연결합니다.'));
document.querySelector('.mapBtn').addEventListener('click',()=>alert('다음 단계에서 세계지도 화면을 연결합니다.'));
</script>
</body>
</html>
