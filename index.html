<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SBI 사이다 낚시왕</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="phone" aria-label="SBI 사이다 낚시왕">
    <section id="screen" class="screen screen-home" aria-live="polite">
      <div class="touch-zones">
        <button class="hot home-fish" data-screen="fishing" aria-label="낚시하기"></button>
        <button class="hot home-map" data-screen="map" aria-label="세계지도"></button>
        <button class="hot nav-home" data-screen="home" aria-label="홈"></button>
        <button class="hot nav-mission" data-screen="mission" aria-label="미션"></button>
        <button class="hot nav-book" data-screen="book" aria-label="도감"></button>
        <button class="hot nav-rod" data-screen="rod" aria-label="낚싯대"></button>
      </div>
    </section>

    <div id="fishingOverlay" class="overlay hidden" aria-hidden="true">
      <div class="gauge-card">
        <p class="bite-title">물고기가 입질하고 있어요!</p>
        <p class="bite-sub">초록 영역에 맞춰 클릭하세요</p>
        <div class="gauge" id="gauge">
          <span class="zone danger left"></span>
          <span class="zone warn left"></span>
          <span class="zone success"></span>
          <span class="zone warn right"></span>
          <span class="zone danger right"></span>
          <span id="pointer" class="pointer"></span>
        </div>
        <button id="catchBtn" class="catch-btn">클릭!</button>
      </div>
    </div>

    <div id="resultModal" class="result hidden" role="dialog" aria-modal="true" aria-label="낚시 결과">
      <div class="result-card">
        <button id="closeResult" class="close" aria-label="닫기">×</button>
        <h2 id="resultTitle">성공!</h2>
        <div id="fishIcon" class="fish-icon">🐟</div>
        <h3 id="fishName">사이다 붕어</h3>
        <p id="fishMeta">무게 0.35KG · 길이 21.4cm</p>
        <p id="fishDesc">사이다 호수에서 가장 흔하게 잡히는 붕어. 탄산 기포를 좋아한다.</p>
        <div class="reward"><span>⭐ EXP +18</span><span>🪙 +34</span></div>
        <button id="okResult" class="ok-btn">확인</button>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
